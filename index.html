<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapBridge Directions</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f6f7f9;
      color: #111827;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.6rem;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.5;
    }

    .address {
      font-weight: 600;
      margin: 14px 0 20px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.button {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      background: #111827;
      color: white;
      font-weight: 600;
    }

    a.button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .small {
      margin-top: 14px;
      font-size: 0.92rem;
      color: #6b7280;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0f172a;
        color: #e5e7eb;
      }

      .card {
        background: #111827;
        box-shadow: none;
      }

      .small {
        color: #9ca3af;
      }

      a.button {
        background: #f9fafb;
        color: #111827;
      }

      a.button.secondary {
        background: #1f2937;
        color: #f9fafb;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening directions…</h1>
    <p>We’ll send you to the best map experience for your device.</p>
    <p class="address">
      <span id="destinationName">Gardens on Q</span><br />
      <span id="destinationSubtitle">74192 Q Rd, Holdrege, NE 68949</span>
    </p>
    <div class="button-row">
      <a id="fallbackLink" class="button" href="https://www.google.com/maps/dir/?api=1&destination=40.581321427289%2C-99.323015533602">Open directions</a>
      <a id="googleLink" class="button secondary" href="https://www.google.com/maps/dir/?api=1&destination=40.581321427289%2C-99.323015533602">Google Maps</a>
      <a id="appleLink" class="button secondary" href="https://maps.apple.com/?daddr=40.581321427289%2C-99.323015533602">Apple Maps</a>
    </div>
    <p class="small">If nothing happens automatically, tap the button.</p>
    <noscript class="small">JavaScript is required for automatic routing.</noscript>
  </main>

  <script>
    const DEFAULT_DESTINATION = {
      name: "Gardens on Q",
      query: "74192 Q Rd, Holdrege, NE 68949",
      lat: 40.581321427289,
      lng: -99.323015533602
    };

    function getDestination() {
      const params = new URLSearchParams(window.location.search);
      const name = (params.get("name") || "").trim();
      const query = (params.get("q") || "").trim();
      const lat = Number(params.get("lat"));
      const lng = Number(params.get("lng"));
      const hasCoords = Number.isFinite(lat) && Number.isFinite(lng);

      if (hasCoords) {
        return {
          name: name || query || "Pinned location",
          query: query || `${lat},${lng}`,
          lat,
          lng
        };
      }

      if (query) {
        return { name: name || query, query, lat: null, lng: null };
      }

      return { ...DEFAULT_DESTINATION };
    }

    function getMapUrls(destination) {
      if (Number.isFinite(destination.lat) && Number.isFinite(destination.lng)) {
        const coordinatePair = `${destination.lat},${destination.lng}`;
        const labeledGeoQuery = destination.name
          ? `${coordinatePair} (${destination.name})`
          : coordinatePair;
        return {
          apple: `https://maps.apple.com/?daddr=${encodeURIComponent(coordinatePair)}`,
          google: `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(coordinatePair)}`,
          geo: `geo:0,0?q=${encodeURIComponent(labeledGeoQuery)}`
        };
      }

      const encodedQuery = encodeURIComponent(destination.query);
      return {
        apple: `https://maps.apple.com/?daddr=${encodedQuery}`,
        google: `https://www.google.com/maps/dir/?api=1&destination=${encodedQuery}`,
        geo: `geo:0,0?q=${encodedQuery}`
      };
    }

    const destination = getDestination();
    const urls = getMapUrls(destination);

    const destinationName = document.getElementById("destinationName");
    const destinationSubtitleText = document.getElementById("destinationSubtitle");
    const destinationSubtitle = destination.query
      || `${destination.lat}, ${destination.lng}`;
    destinationName.textContent = destination.name;
    destinationSubtitleText.textContent = destinationSubtitle;

    const ua = navigator.userAgent || navigator.vendor || "";
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua)
      || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    let targetUrl = urls.google;
    if (isIOS) {
      targetUrl = urls.apple;
    }

    const fallbackLink = document.getElementById("fallbackLink");
    const googleLink = document.getElementById("googleLink");
    const appleLink = document.getElementById("appleLink");
    fallbackLink.href = targetUrl;
    fallbackLink.textContent = isIOS ? "Open in Apple Maps" : "Open directions";
    googleLink.href = urls.google;
    appleLink.href = urls.apple;

    function redirectToPreferredMap() {
      if (isAndroid) {
        window.location.href = urls.geo;
        window.setTimeout(() => {
          if (!document.hidden) {
            window.location.replace(urls.google);
          }
        }, 700);
        return;
      }

      window.location.replace(targetUrl);
    }

    window.setTimeout(redirectToPreferredMap, 50);
  </script>
</body>
</html>
