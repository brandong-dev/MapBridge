<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapBridge Directions</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f6f7f9;
      color: #111827;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.6rem;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.5;
    }

    .address {
      font-weight: 600;
      margin: 14px 0 20px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.button {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      background: #111827;
      color: white;
      font-weight: 600;
    }

    a.button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .small {
      margin-top: 14px;
      font-size: 0.92rem;
      color: #6b7280;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0f172a;
        color: #e5e7eb;
      }

      .card {
        background: #111827;
        box-shadow: none;
      }

      .small {
        color: #9ca3af;
      }

      a.button {
        background: #f9fafb;
        color: #111827;
      }

      a.button.secondary {
        background: #1f2937;
        color: #f9fafb;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening directions…</h1>
    <p>We’ll send you to the best map experience for your device.</p>
    <p class="address">
      <span id="destinationName">Gardens on Q</span><br />
      <span id="destinationSubtitle">74192 Q Rd, Holdrege, NE 68949</span>
    </p>
    <div class="button-row">
      <a id="fallbackLink" class="button" href="https://www.google.com/maps/search/?api=1&query=Gardens%20on%20Q%2C%2074192%20Q%20Rd%2C%20Holdrege%2C%20NE%2068949">Open directions</a>
      <a id="googleLink" class="button secondary" href="https://www.google.com/maps/search/?api=1&query=Gardens%20on%20Q%2C%2074192%20Q%20Rd%2C%20Holdrege%2C%20NE%2068949">Google Maps</a>
      <a id="appleLink" class="button secondary" href="https://maps.apple.com/?q=Gardens%20on%20Q%2C%2074192%20Q%20Rd%2C%20Holdrege%2C%20NE%2068949">Apple Maps</a>
    </div>
    <p class="small">If nothing happens automatically, tap the button.</p>
    <noscript class="small">JavaScript is required for automatic routing.</noscript>
  </main>

  <script>
    const DEFAULT_DESTINATION = {
      name: "Gardens on Q",
      query: "Gardens on Q, 74192 Q Rd, Holdrege, NE 68949"
    };

    function getDestination() {
      const params = new URLSearchParams(window.location.search);
      const name = (params.get("name") || "").trim();
      const query = (params.get("q") || "").trim();

      function parseCoordinate(rawValue, min, max) {
        if (rawValue === null) return NaN;
        const trimmed = rawValue.trim();
        if (trimmed.length === 0) return NaN;
        const numeric = Number(trimmed);
        if (!Number.isFinite(numeric)) return NaN;
        if (numeric < min || numeric > max) return NaN;
        return numeric;
      }

      const lat = parseCoordinate(params.get("lat"), -90, 90);
      const lng = parseCoordinate(params.get("lng"), -180, 180);
      const hasCoords = Number.isFinite(lat) && Number.isFinite(lng);

      if (hasCoords) {
        return {
          name: name || query || "Pinned location",
          query: query || `${lat},${lng}`,
          lat,
          lng
        };
      }

      if (query) {
        return { name: name || query, query, lat: null, lng: null };
      }

      return { ...DEFAULT_DESTINATION };
    }

    function getMapUrls(destination) {
      if (Number.isFinite(destination.lat) && Number.isFinite(destination.lng)) {
        const coordinatePair = `${destination.lat},${destination.lng}`;
        const hasName = typeof destination.name === "string" && destination.name.trim().length > 0;
        const nameSlug = encodeURIComponent(destination.name.trim()).replace(/%20/g, "+");
        const zoom = 20;
        return {
          appleWeb: hasName
            ? `https://maps.apple.com/?q=${encodeURIComponent(destination.name)}&ll=${encodeURIComponent(coordinatePair)}`
            : `https://maps.apple.com/?q=${encodeURIComponent(coordinatePair)}`,
          appleApp: hasName
            ? `maps://?q=${encodeURIComponent(destination.name)}&ll=${encodeURIComponent(coordinatePair)}`
            : `maps://?q=${encodeURIComponent(coordinatePair)}`,
          google: hasName
            ? `https://www.google.com/maps/place/${nameSlug}/@${coordinatePair},${zoom}z`
            : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(coordinatePair)}`
        };
      }

      const encodedQuery = encodeURIComponent(destination.query);
      return {
        appleWeb: `https://maps.apple.com/?q=${encodedQuery}`,
        appleApp: `maps://?q=${encodedQuery}`,
        google: `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`
      };
    }

    const destination = getDestination();
    const urls = getMapUrls(destination);

    const destinationName = document.getElementById("destinationName");
    const destinationSubtitleText = document.getElementById("destinationSubtitle");
    const destinationSubtitle = destination.query
      || `${destination.lat}, ${destination.lng}`;
    destinationName.textContent = destination.name;
    destinationSubtitleText.textContent = destinationSubtitle;

    const ua = navigator.userAgent || navigator.vendor || "";
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua)
      || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    let targetUrl = urls.google;
    if (isIOS) {
      targetUrl = urls.appleApp;
    }

    const fallbackLink = document.getElementById("fallbackLink");
    const googleLink = document.getElementById("googleLink");
    const appleLink = document.getElementById("appleLink");
    fallbackLink.href = targetUrl;
    fallbackLink.textContent = isIOS
      ? "Open in Apple Maps"
      : (isAndroid ? "Open in Google Maps" : "Open directions");
    googleLink.href = urls.google;
    appleLink.href = isIOS ? urls.appleApp : urls.appleWeb;

    function redirectToPreferredMap() {
      if (isIOS) {
        window.location.href = urls.appleApp;
        return;
      }

      window.location.replace(targetUrl);
    }

    window.setTimeout(redirectToPreferredMap, 50);
  </script>
</body>
</html>
